<!DOCTYPE html>
<html>
<head>
    <title>GameVault</title>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family:Ariasl, sans-serif;
            margin: 0;
        }

        .header {
            background-color: #161b22;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 40px;
        }

        .hero {
           text-align: center;
           padding: 50px 20px;
        }

        .games {
           display: flex;
           justify-content: center;
           flex-wrap: wrap;
           gap: 20px;
           padding: 20px;
        }

        .card {
            background-color: #161b22;
            width: 250px;
            padding: 20px;
            border-radius: 15px;
        }

        .card h2 {
           margin-top: 0;
        }
  
        .button {
            display: inline-block:
            background-color: #238636;
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
        }

        .footer {
           text-align: center;
           padding: 20px;
           margin-top: 30px;
        }
    </style>
</head>
<body>


    <div class="header">
        <h1>🎮 GamerVault</h1>
        <p>Discover the best PC and Mobile Games</p>
    </div>


    <div class="hero">
        <h2>Featured Games</h2>
        <p>Find prices, requirements and reviews</p>
    </div>


    <div class="games">


        <div class="card">
            <h2>Minecraft</h2>
            <p>Sandbox survival adventure.</p>
            <a href="#" class="button">View Game</a>

        </div>


        <div class="card">
            <h2>Black Myth: Wukong</h2>
            <p>Action RPG based on Journey to the West.</p>
            <Platform: PC, PS5</p>
            <a href="#" class="button">View Game</a>
        </div>


    </div>
    

    <div class="footer>
        © 2026 GameVault
    </div>


</body>
</html>
